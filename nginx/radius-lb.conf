worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

stream {
    resolver 127.0.0.11 valid=5s ipv6=off;

    proxy_buffer_size 16k;

    upstream radius_auth {
        server freeradius-1:1812;
        server freeradius-2:1812;
    }

    upstream radius_acct {
        server freeradius-1:1813;
        server freeradius-2:1813;
    }

    server {
        listen 1812 udp reuseport;
        proxy_pass radius_auth;
        proxy_timeout 10s;
        proxy_responses 1;
    }

    server {
        listen 1813 udp reuseport;
        proxy_pass radius_acct;
        proxy_timeout 10s;
        proxy_responses 1;
    }
}
