services:
  radius-lb:
    image: nginx:1.27-alpine
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./nginx/radius-lb.conf:/etc/nginx/nginx.conf:ro
    networks:
      - radius-net
    depends_on:
      freeradius:
        condition: service_started

  freeradius:
    image: freeradius/freeradius-server:3.2.7
    volumes:
      - ./freeradius/radiusd.conf:/etc/freeradius/radiusd.conf:ro
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf:ro
      - ./freeradius/mods-enabled/rest:/etc/freeradius/mods-enabled/rest:ro
      - ./freeradius/mods-enabled/cache_rest_health:/etc/freeradius/mods-enabled/cache_rest_health:ro
      - ./freeradius/sites-enabled/default:/etc/freeradius/sites-enabled/default:ro
    networks:
      - radius-net
    depends_on:
      nginx:
        condition: service_started
    deploy:
      replicas: 4
    command: freeradius -f

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - radius-net
    depends_on:
      auth-svc:
        condition: service_healthy
      acct-svc:
        condition: service_healthy

  auth-svc:
    build: ./auth-svc
    volumes:
      - ./auth-svc/app:/app/app:ro
      - ./auth-svc/data:/app/data:ro
    networks:
      - radius-net
    deploy:
      replicas: 4
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')"]
      interval: 3s
      timeout: 3s
      retries: 10

  acct-svc:
    build: ./acct-svc
    volumes:
      - ./acct-svc/app:/app/app:ro
    networks:
      - radius-net
    deploy:
      replicas: 4
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')"]
      interval: 3s
      timeout: 3s
      retries: 10

  locust-master:
    build: ./loadtest
    ports:
      - "8089:8089"
    volumes:
      - ./loadtest/locustfile.py:/app/locustfile.py:ro
    environment:
      - RADIUS_HOST=radius-lb
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
    command: locust -f locustfile.py --master --expect-workers=5
    networks:
      - radius-net
    depends_on:
      radius-lb:
        condition: service_started

  locust-worker:
    build: ./loadtest
    volumes:
      - ./loadtest/locustfile.py:/app/locustfile.py:ro
    environment:
      - RADIUS_HOST=radius-lb
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
    command: locust -f locustfile.py --worker --master-host=locust-master
    deploy:
      replicas: 5
    networks:
      - radius-net
    depends_on:
      locust-master:
        condition: service_started

  radclient-ui:
    build: ./radclient-ui
    ports:
      - "8000:8000"
    volumes:
      - ./radclient-ui/app:/app/app
    environment:
      - RADIUS_HOST=radius-lb
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
    networks:
      - radius-net
    depends_on:
      radius-lb:
        condition: service_started

networks:
  radius-net:
    driver: bridge
