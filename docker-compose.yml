services:
  radius-lb:
    image: nginx:1.27-alpine
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./nginx/radius-lb.conf:/etc/nginx/nginx.conf:ro
    networks:
      - radius-net
    logging:
      driver: "none"
    depends_on:
      freeradius-1:
        condition: service_started
      freeradius-2:
        condition: service_started

  freeradius-1:
    image: freeradius/freeradius-server:3.2.7
    volumes: &freeradius-volumes
      - ./freeradius/radiusd.conf:/etc/freeradius/radiusd.conf:ro
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf:ro
      - ./freeradius/mods-enabled/rest:/etc/freeradius/mods-enabled/rest:ro
      - ./freeradius/mods-enabled/cache_rest_health:/etc/freeradius/mods-enabled/cache_rest_health:ro
      - ./freeradius/sites-enabled/default:/etc/freeradius/sites-enabled/default:ro
    networks:
      - radius-net
    logging: &logging-none
      driver: "none"
    depends_on: &freeradius-depends
      auth-svc-1:
        condition: service_healthy
      auth-svc-2:
        condition: service_healthy
      acct-svc-1:
        condition: service_healthy
      acct-svc-2:
        condition: service_healthy
    command: freeradius -f

  freeradius-2:
    image: freeradius/freeradius-server:3.2.7
    volumes: *freeradius-volumes
    networks:
      - radius-net
    logging: *logging-none
    depends_on: *freeradius-depends
    command: freeradius -f

  auth-svc-1:
    build: ./auth-svc
    volumes: &auth-svc-volumes
      - ./auth-svc/app:/app/app:ro
      - ./auth-svc/data:/app/data:ro
    networks:
      - radius-net
    logging: *logging-none
    healthcheck: &auth-svc-healthcheck
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')"]
      interval: 3s
      timeout: 3s
      retries: 10

  auth-svc-2:
    build: ./auth-svc
    volumes: *auth-svc-volumes
    networks:
      - radius-net
    logging: *logging-none
    healthcheck: *auth-svc-healthcheck

  acct-svc-1:
    build: ./acct-svc
    volumes: &acct-svc-volumes
      - ./acct-svc/app:/app/app:ro
    networks:
      - radius-net
    logging: *logging-none
    healthcheck: &acct-svc-healthcheck
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')"]
      interval: 3s
      timeout: 3s
      retries: 10

  acct-svc-2:
    build: ./acct-svc
    volumes: *acct-svc-volumes
    networks:
      - radius-net
    logging: *logging-none
    healthcheck: *acct-svc-healthcheck

  locust-master:
    build: ./loadtest
    ports:
      - "8089:8089"
    volumes:
      - ./loadtest/locustfile.py:/app/locustfile.py:ro
    environment:
      - RADIUS_HOST=radius-lb
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
    command: locust -f locustfile.py --master --expect-workers=10
    networks:
      - radius-net
    depends_on:
      radius-lb:
        condition: service_started

  locust-worker:
    build: ./loadtest
    volumes:
      - ./loadtest/locustfile.py:/app/locustfile.py:ro
    environment:
      - RADIUS_HOST=radius-lb
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
    command: locust -f locustfile.py --worker --master-host=locust-master
    deploy:
      replicas: 10
    networks:
      - radius-net
    depends_on:
      locust-master:
        condition: service_started

  radclient-ui:
    build: ./radclient-ui
    ports:
      - "8000:8000"
    volumes:
      - ./radclient-ui/app:/app/app
    environment:
      - RADIUS_HOST=radius-lb
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
    networks:
      - radius-net
    depends_on:
      radius-lb:
        condition: service_started

networks:
  radius-net:
    driver: bridge
