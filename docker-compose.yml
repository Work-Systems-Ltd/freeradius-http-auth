services:
  radius-lb:
    image: nginx:1.27-alpine
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./nginx/radius-lb.conf:/etc/nginx/nginx.conf:ro
    networks:
      - radius-net
    depends_on:
      freeradius-1:
        condition: service_started
      freeradius-2:
        condition: service_started

  freeradius-1:
    image: freeradius/freeradius-server:3.2.7
    volumes: &freeradius-volumes
      - ./freeradius/radiusd.conf:/etc/freeradius/radiusd.conf:ro
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf:ro
      - ./freeradius/mods-enabled/rest:/etc/freeradius/mods-enabled/rest:ro
      - ./freeradius/mods-enabled/cache_rest_health:/etc/freeradius/mods-enabled/cache_rest_health:ro
      - ./freeradius/sites-enabled/default:/etc/freeradius/sites-enabled/default:ro
    networks:
      - radius-net
    depends_on: &freeradius-depends
      auth-svc:
        condition: service_healthy
      acct-svc:
        condition: service_healthy
    command: freeradius -f

  freeradius-2:
    image: freeradius/freeradius-server:3.2.7
    volumes: *freeradius-volumes
    networks:
      - radius-net
    depends_on: *freeradius-depends
    command: freeradius -f

  auth-svc:
    build: ./auth-svc
    volumes:
      - ./auth-svc/app:/app/app:ro
      - ./auth-svc/data:/app/data:ro
    networks:
      - radius-net
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 3s
      timeout: 3s
      retries: 10

  acct-svc:
    build: ./acct-svc
    volumes:
      - ./acct-svc/app:/app/app:ro
    networks:
      - radius-net
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 3s
      timeout: 3s
      retries: 10

  radclient-ui:
    build: ./radclient-ui
    ports:
      - "8000:8000"
    volumes:
      - ./radclient-ui/app:/app/app
    environment:
      - RADIUS_HOST=radius-lb
      - RADIUS_SECRET=${RADIUS_SECRET:-testing123}
      - LOADTEST_TARGETS=freeradius-1,freeradius-2
    networks:
      - radius-net
    depends_on:
      radius-lb:
        condition: service_started

networks:
  radius-net:
    driver: bridge
